<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Materials Class 9 Class 10 Social Science</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #dce8ff);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loginCard {
      background: #ffffff;
      padding: 30px 25px 35px 25px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      border: 1px solid #c7d6ff;
    }

    #loginCard img {
      width: 95px;
      margin-bottom: 15px;
    }

    #loginCard h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #003c8f;
      font-weight: 700;
    }

    #loginCard input {
      width: 100%;
      padding: 12px;
      border: 2px solid #003c8f;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
    }

    #loginCard button {
      width: 100%;
      padding: 12px;
      background: #003c8f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    #appContainer {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
	
	










.register-btn{
  display:inline-block;
  padding:10px 16px;
  background:linear-gradient(135deg, #ff9800, #f57c00);
  color:white;
  border-radius:8px;
  font-size:13px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  transition:0.3s;
}

.register-btn:hover{
  background:linear-gradient(135deg, #ffa726, #ef6c00);
  transform:translateY(-2px);
  box-shadow:0 6px 12px rgba(0,0,0,0.3);
}


	
	
	
	
	
	
	
	
	
	
	
  </style>
</head>

<body>

  <div id="loginContainer">
    <div id="loginCard">

      <img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png" alt="Logo">

      <h2>Login to Study Materials<br>Class 9 and Class 10 Solical science </h2>

      <input type="email" id="emailInput" placeholder="Enter your email" required />
	  
	  
	  
	  
	  
	  
	  
	  
	  
	  
	    <p id="loginError" style="color:red; font-size:13px; margin-top:5px;"></p>
		
		
		
		
		
		
		
		
		
		
		
		
		

      <button onclick="login()">Login</button>
    </div>
  </div>

<div id="appContainer">
  
  <!-- TOP BUTTON BAR -->
  <div style="padding:10px; background:#003c8f; text-align:center;">
    <button onclick="loadPage(9)" style="margin:5px; padding:10px;">Class 9 SST</button>
    <button onclick="loadPage(10)" style="margin:5px; padding:10px;">Class 10 SST</button>
  </div>

  <!-- MESSAGE (DEFAULT VIEW) -->
  <div id="defaultMessage" style="
    display:flex;
    justify-content:center;
    align-items:center;
    height:90%;
    font-size:20px;
    color:#003c8f;
    font-weight:bold;
  ">
    📘 Please choose your class to continue
  </div>

  <!-- IFRAME -->
  <iframe id="viewer" style="display:none;"></iframe>

</div>

  <script>
  const BACKEND_URL = "https://class-9-and-10-sst-sm.onrender.com";


const LINK_CLASS_9 = "https://smcl10science-hash.github.io/SM-Cl-10-Science-data/html/SM 9 Social science.html";
const LINK_CLASS_10 = "https://smcl10science-hash.github.io/SM-Cl-10-Science-data/html/SM 10 science.html";















async function login() {
  const email = document.getElementById("emailInput").value.trim().toLowerCase();
  const errorBox = document.getElementById("loginError");

  // Validation
  if (!email || !email.includes("@")) {
    errorBox.innerHTML = `
      Your E-Mail ID is not registered.<br><br>
      <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="register-btn">
        Register Now
      </a>
    `;
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("studentEmail", email);
      localStorage.setItem("sessionToken", data.token);

      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "block";
      

    } else {
      errorBox.innerHTML = `
        Your E-Mail ID is not registered.<br><br>
        <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="register-btn">
          Register Now
        </a>
      `;
    }

  } catch (err) {
    errorBox.innerText = "Server error. Try later.";
  }
} // ✅ VERY IMPORTANT — THIS WAS MISSING


document.getElementById("emailInput").addEventListener("input", function() {
  const errorBox = document.getElementById("loginError");
  errorBox.innerHTML = ""; // 🔥 clears error + hides Register button
});














// ✅ ADD HERE (RIGHT AFTER LOGIN FUNCTION)
window.onload = async function() {
  const email = localStorage.getItem("studentEmail");
  const token = localStorage.getItem("sessionToken");

  if (!email || !token) return;

  const res = await fetch(`${BACKEND_URL}/validate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, token })
  });

  const data = await res.json();

  if (data.valid) {
    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("appContainer").style.display = "block";
    
  } else {
    localStorage.clear();
  }
};






function loadPage(cls) {
  document.getElementById("defaultMessage").style.display = "none";
  document.getElementById("viewer").style.display = "block";

  if (cls === 9) {
    document.getElementById("viewer").src = LINK_CLASS_9;
  } else {
    document.getElementById("viewer").src = LINK_CLASS_10;
  }
}




    // ------------------------------
    // AUTO-LOGOUT IF ANOTHER DEVICE LOGS IN
    // ------------------------------
    setInterval(async () => {
      const email = localStorage.getItem("studentEmail");
      const token = localStorage.getItem("sessionToken");

      if (!email || !token) return;

      const res = await fetch(`${BACKEND_URL}/validate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, token })
      });

      const data = await res.json();

      if (!data.valid) {
        alert("⚠️ You have been logged out because this account was opened on another device.");
        localStorage.clear();
        location.reload();
      }
    }, 5000);
  </script>

</body>
</html>
